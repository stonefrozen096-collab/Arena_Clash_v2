<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="60%" stop-color="#0d0d2e"/>
      <stop offset="100%" stop-color="#05050f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4CC9F0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9B5DE5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>

  <!-- Pink border ring -->
  <rect x="20" y="20" width="472" height="472" rx="76"
        fill="none" stroke="#F72585" stroke-width="12" opacity="0.6"/>

  <!-- Glow behind swords -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- Sword 1 (top-left to bottom-right) -->
  <g transform="translate(256,256) rotate(-45)">
    <polygon points="-180,-16 120,-8 180,0 120,8 -180,16" fill="url(#blade1)"/>
    <rect x="-16" y="-46" width="32" height="92" fill="#F72585"/>
    <rect x="-196" y="-18" width="80" height="36" rx="6" fill="#D4AC0D"/>
    <circle cx="-196" cy="0" r="26" fill="#FFD700"/>
  </g>

  <!-- Sword 2 (top-right to bottom-left) -->
  <g transform="translate(256,256) rotate(45)">
    <polygon points="-180,-16 120,-8 180,0 120,8 -180,16" fill="url(#blade1)"/>
    <rect x="-16" y="-46" width="32" height="92" fill="#F72585"/>
    <rect x="-196" y="-18" width="80" height="36" rx="6" fill="#D4AC0D"/>
    <circle cx="-196" cy="0" r="26" fill="#FFD700"/>
  </g>

  <!-- Center diamond -->
  <polygon points="256,220 286,256 256,292 226,256" fill="#FFD700"/>
  <polygon points="256,228 278,256 256,284 234,256" fill="#FFF9C4"/>

  <!-- Title text -->
  <text x="256" y="460" font-family="Arial,sans-serif" font-weight="bold"
        font-size="42" text-anchor="middle" fill="white" opacity="0.75">ARENA CLASH</text>
</svg>
